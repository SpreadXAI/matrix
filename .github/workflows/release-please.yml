name: release-please

# Owns version bumps. On every push to main, release-please maintains a single
# "release PR" that bumps the version (derived from Conventional Commit messages
# since the last release) and updates the changelog. Merging that PR tags the
# release. Feature PRs must NOT bump the version by hand — release-please does it,
# keeping package.json + the four plugin manifests in lockstep (see
# release-please-config.json `extra-files`).
#
# Auth: the org forbids the default Actions bot (GITHUB_TOKEN) from creating PRs
# ("GitHub Actions is not permitted to create or approve pull requests"), so
# release-please authenticates as a GitHub App instead. `create-github-app-token`
# mints a short-lived, repo-scoped token whose author identity is not subject to
# that org policy. Requires repo secrets RELEASE_PLEASE_APP_ID and
# RELEASE_PLEASE_APP_KEY (the App's private key); the App must have Contents +
# Pull requests: Read/Write and be installed on this repo.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
